spring.application.name=URL_Service2
server.port=8082

spring.datasource.url=jdbc:h2:file:${URL_SHORTENER_DATA_DIR:../../data}/url_service2_db;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

url.pool.low-watermark=500
url.pool.refill-batch-size=500
url.pool.seed-batch-size=5000
url.pool.code-length=6
url.pool.partition-start=f
url.pool.partition-end=t
